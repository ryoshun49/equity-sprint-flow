<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Equity Sprint - プロンプト設計図</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Segoe UI', sans-serif; background: #fff; }

#canvas {
  width: 100vw; height: 100vh; position: relative;
  background-color: #fff;
  background-image:
    linear-gradient(rgba(0,0,0,0.07) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,0,0,0.07) 1px, transparent 1px),
    linear-gradient(rgba(0,0,0,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,0,0,0.025) 1px, transparent 1px);
  background-size: 100px 100px, 100px 100px, 20px 20px, 20px 20px;
  cursor: grab;
}
#canvas:active { cursor: grabbing; }
#world { position: absolute; top: 0; left: 0; transform-origin: 0 0; }

/* ── Tabs ── */
#tab-bar {
  position: fixed; top: 12px; left: 50%; transform: translateX(-50%); z-index: 20;
  display: flex; background: #f0f2f5; border-radius: 10px; padding: 4px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08); border: 1px solid #d0d7de;
}
.tab {
  padding: 8px 20px; border-radius: 7px; cursor: pointer; font-size: 13px;
  font-weight: 600; color: #656d76; transition: all 0.15s; white-space: nowrap;
}
.tab:hover { color: #1f2328; }
.tab.active { background: #fff; color: #1f2328; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }

/* ── Layers ── */
.layer {
  position: absolute; border-radius: 16px; border: 2px dashed;
  display: flex; flex-direction: column; padding: 16px;
}
.layer-label {
  font-size: 13px; font-weight: 800; letter-spacing: 0.5px;
  margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
}
.layer-label .num {
  width: 24px; height: 24px; border-radius: 50%; display: flex;
  align-items: center; justify-content: center; font-size: 12px;
  color: #fff; font-weight: 800; flex-shrink: 0;
}
.layer-cards { display: flex; gap: 14px; flex-wrap: wrap; }

.layer[data-color="blue"]   { background: rgba(9,105,218,0.04); border-color: rgba(9,105,218,0.25); }
.layer[data-color="blue"] .layer-label { color: #0969da; }
.layer[data-color="blue"] .num { background: #0969da; }
.layer[data-color="purple"] { background: rgba(130,80,223,0.04); border-color: rgba(130,80,223,0.25); }
.layer[data-color="purple"] .layer-label { color: #8250df; }
.layer[data-color="purple"] .num { background: #8250df; }
.layer[data-color="green"]  { background: rgba(26,127,55,0.04); border-color: rgba(26,127,55,0.2); }
.layer[data-color="green"] .layer-label { color: #1a7f37; }
.layer[data-color="green"] .num { background: #1a7f37; }
.layer[data-color="amber"]  { background: rgba(191,135,0,0.04); border-color: rgba(191,135,0,0.2); }
.layer[data-color="amber"] .layer-label { color: #9a6700; }
.layer[data-color="amber"] .num { background: #bf8700; }
.layer[data-color="gray"]   { background: rgba(31,35,40,0.03); border-color: rgba(31,35,40,0.2); }
.layer[data-color="gray"] .layer-label { color: #1f2328; }
.layer[data-color="gray"] .num { background: #1f2328; }
.layer[data-color="red"]    { background: rgba(207,34,46,0.03); border-color: rgba(207,34,46,0.2); }
.layer[data-color="red"] .layer-label { color: #cf222e; }
.layer[data-color="red"] .num { background: #cf222e; }

/* ── Nodes ── */
.node {
  width: 220px; background: #fff; border: 1.5px solid #d0d7de; border-radius: 10px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06); cursor: pointer;
  transition: box-shadow 0.15s, transform 0.15s;
}
.node:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.12); transform: translateY(-2px); cursor: pointer; }
.node::after {
  content: '詳細を見る →'; display: block; font-size: 10.5px; color: #0969da;
  padding: 0 16px 10px;
}
.node-inner { padding: 14px 16px; display: flex; align-items: center; gap: 10px; }
.node-icon { font-size: 20px; flex-shrink: 0; }
.node-title { font-weight: 700; font-size: 13px; color: #1f2328; }
.node-peek { padding: 0 16px 8px; font-size: 11.5px; color: #656d76; line-height: 1.5; }

/* ── Arrows SVG ── */
#arrows-svg { position: absolute; top: 0; left: 0; width: 4000px; height: 1500px; pointer-events: none; }

/* ── Modal ── */
#modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4);
  z-index: 1000; justify-content: center; align-items: center;
  backdrop-filter: blur(3px);
}
#modal-overlay.open { display: flex; }
#modal {
  background: #fff; border-radius: 16px; width: 720px; max-width: 90vw;
  max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  animation: modalIn 0.2s ease;
}
@keyframes modalIn {
  from { opacity: 0; transform: scale(0.95) translateY(10px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}
#modal-header {
  padding: 24px 32px 16px; display: flex; align-items: center; gap: 14px;
  border-bottom: 1px solid #e8ecf0; position: sticky; top: 0; background: #fff;
  border-radius: 16px 16px 0 0; z-index: 1;
}
#modal-header .m-icon { font-size: 28px; }
#modal-header .m-title { font-size: 20px; font-weight: 800; flex: 1; }
#modal-close {
  width: 36px; height: 36px; border: none; background: #f6f8fa;
  border-radius: 8px; font-size: 18px; cursor: pointer; color: #656d76;
  display: flex; align-items: center; justify-content: center;
}
#modal-close:hover { background: #e8ecf0; color: #1f2328; }
#modal-body {
  padding: 24px 32px 32px; font-size: 14.5px; line-height: 1.9; color: #424a53;
}
#modal-body p { margin: 6px 0; }
#modal-body ul, #modal-body ol { padding-left: 20px; margin: 6px 0; }
#modal-body li { margin: 5px 0; }
#modal-body strong { color: #1f2328; }
#modal-body .sub { color: #888; font-size: 13px; }
#modal-body .section { margin-top: 20px; padding-top: 16px; border-top: 1px dashed #e8ecf0; }
#modal-body h4 { font-size: 15px; color: #1f2328; margin-bottom: 6px; font-weight: 700; }
#modal-body table { border-collapse: collapse; width: 100%; margin: 10px 0; font-size: 13px; }
#modal-body th, #modal-body td { border: 1px solid #e8ecf0; padding: 8px 12px; text-align: left; }
#modal-body th { background: #f6f8fa; font-weight: 700; color: #1f2328; }

.tag { display: inline-block; padding: 2px 10px; border-radius: 5px; font-size: 12px; margin: 2px 3px; font-weight: 600; }
.tag-green { background: #dafbe1; color: #1a7f37; }
.tag-red { background: #ffebe9; color: #cf222e; }
.tag-yellow { background: #fff8c5; color: #9a6700; }

.example-block {
  background: #f6f8fa; border-radius: 8px; padding: 16px 18px; margin: 12px 0;
  border-left: 4px solid #0969da;
}
.example-block .company { font-weight: 700; color: #0969da; font-size: 14px; }
.example-block .catch { font-weight: 800; color: #1f2328; font-size: 16px; margin: 6px 0; }
.example-block .body-copy { color: #424a53; font-size: 13.5px; line-height: 1.8; }

.callout { background: #fff8c5; border-left: 4px solid #bf8700; padding: 12px 16px; border-radius: 6px; margin: 10px 0; font-size: 13.5px; }
.callout-red { background: #ffebe9; border-left-color: #cf222e; }

/* ── Controls ── */
#controls {
  position: fixed; top: 12px; right: 16px; display: flex; gap: 6px; z-index: 20;
}
#controls button {
  background: #fff; border: 1px solid #d0d7de; color: #424a53;
  padding: 7px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500;
}
#controls button:hover { background: #f6f8fa; border-color: #0969da; color: #0969da; }

#minimap {
  position: fixed; bottom: 16px; right: 16px; width: 220px; height: 100px;
  background: rgba(255,255,255,0.95); border: 1px solid #d0d7de; border-radius: 8px;
  overflow: hidden; z-index: 10; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}
#minimap-viewport {
  position: absolute; border: 2px solid #0969da; background: rgba(9,105,218,0.06);
  pointer-events: none; border-radius: 2px;
}
</style>
</head>

// ══════════════════════════════════════
//  ENGINE
// ══════════════════════════════════════

const world = document.getElementById('world');
const canvasEl = document.getElementById('canvas');
let scale = 0.82, tx = 30, ty = 60;
let panDragging = false, panLastX, panLastY;
let layerDrag = null;
let currentChart = 'keyword';
let layerEls = {};
let allNodes = [];

const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
svg.id = 'arrows-svg';

function renderChart(key) {
  currentChart = key;
  const chart = charts[key];
  allNodes = chart.layers.flatMap(l => l.nodes);
  layerEls = {};

  // Clear world
  world.innerHTML = '';
  world.appendChild(svg);

  // Create layers
  chart.layers.forEach(layer => {
    const el = document.createElement('div');
    el.className = 'layer';
    el.dataset.color = layer.color;
    el.dataset.lid = layer.id;
    el.style.left = layer.x + 'px';
    el.style.top = layer.y + 'px';
    el.style.cursor = 'grab';

    let cardsHtml = '';
    layer.nodes.forEach(n => {
      cardsHtml += `<div class="node" data-nid="${n.id}">
        <div class="node-inner"><span class="node-icon">${n.icon}</span><span class="node-title">${n.title}</span></div>
        <div class="node-peek">${n.peek}</div>
      </div>`;
    });

    el.innerHTML = `<div class="layer-label"><span class="num">${layer.num}</span>${layer.label}</div>
      <div class="layer-cards">${cardsHtml}</div>`;
    world.appendChild(el);
    layerEls[layer.id] = el;
  });

  // Update tabs
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.chart === key);
  });

  requestAnimationFrame(() => { drawArrows(); applyTransform(); });
}

function drawArrows() {
  const chart = charts[currentChart];
  svg.innerHTML = `<defs><marker id="ah" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
    <polygon points="0 0, 12 4, 0 8" fill="#b0b8c1"/></marker></defs>`;

  for (let i = 0; i < chart.layers.length - 1; i++) {
    const aEl = layerEls[chart.layers[i].id];
    const bEl = layerEls[chart.layers[i + 1].id];
    const aL = parseFloat(aEl.style.left), aT = parseFloat(aEl.style.top);
    const bL = parseFloat(bEl.style.left), bT = parseFloat(bEl.style.top);
    const aR = aL + aEl.offsetWidth;
    const aCy = aT + aEl.offsetHeight / 2;
    const bCy = bT + bEl.offsetHeight / 2;
    const gap = Math.max(bL - aR, 20);
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', `M ${aR} ${aCy} C ${aR + gap * 0.4} ${aCy}, ${bL - gap * 0.4} ${bCy}, ${bL} ${bCy}`);
    path.setAttribute('stroke', '#b0b8c1');
    path.setAttribute('stroke-width', '2');
    path.setAttribute('stroke-dasharray', '6 4');
    path.setAttribute('fill', 'none');
    path.setAttribute('marker-end', 'url(#ah)');
    svg.appendChild(path);
  }
}

function switchChart(key) {
  scale = 0.82; tx = 30; ty = 60;
  renderChart(key);
}

// ── Modal ──
function openModal(id) {
  const n = allNodes.find(n => n.id === id);
  if (!n) return;
  document.getElementById('modal-icon').textContent = n.icon;
  document.getElementById('modal-title').textContent = n.title;
  document.getElementById('modal-body').innerHTML = n.body;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-overlay') && !e.target.closest('#modal-close')) return;
  document.getElementById('modal-overlay').classList.remove('open');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── Node click → modal ──
world.addEventListener('click', e => {
  const nodeEl = e.target.closest('.node');
  if (nodeEl && !layerDrag?.moved) openModal(nodeEl.dataset.nid);
});

// ── Layer drag ──
world.addEventListener('mousedown', e => {
  const lEl = e.target.closest('.layer');
  if (!lEl) return;
  e.stopPropagation();
  layerDrag = {
    lid: lEl.dataset.lid,
    startX: e.clientX, startY: e.clientY,
    origLeft: parseFloat(lEl.style.left), origTop: parseFloat(lEl.style.top),
    moved: false,
  };
  lEl.style.cursor = 'grabbing';
});

window.addEventListener('mousemove', e => {
  if (layerDrag) {
    const dx = (e.clientX - layerDrag.startX) / scale;
    const dy = (e.clientY - layerDrag.startY) / scale;
    if (Math.abs(dx) > 4 || Math.abs(dy) > 4) layerDrag.moved = true;
    const el = layerEls[layerDrag.lid];
    el.style.left = (layerDrag.origLeft + dx) + 'px';
    el.style.top = (layerDrag.origTop + dy) + 'px';
    drawArrows();
    return;
  }
  if (!panDragging) return;
  tx += e.clientX - panLastX; ty += e.clientY - panLastY;
  panLastX = e.clientX; panLastY = e.clientY;
  applyTransform();
});

window.addEventListener('mouseup', () => {
  if (layerDrag) {
    const el = layerEls[layerDrag.lid];
    el.style.cursor = 'grab';
    const chart = charts[currentChart];
    const layer = chart.layers.find(l => l.id === layerDrag.lid);
    if (layer) { layer.x = parseFloat(el.style.left); layer.y = parseFloat(el.style.top); }
    setTimeout(() => { layerDrag = null; }, 10);
    return;
  }
  panDragging = false;
});

canvasEl.addEventListener('mousedown', e => {
  if (e.target.closest('.layer')) return;
  panDragging = true; panLastX = e.clientX; panLastY = e.clientY;
});

canvasEl.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = canvasEl.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const oldScale = scale;
  scale *= e.deltaY > 0 ? 0.92 : 1.08;
  scale = Math.max(0.15, Math.min(3, scale));
  tx = mx - (mx - tx) * (scale / oldScale);
  ty = my - (my - ty) * (scale / oldScale);
  applyTransform();
}, { passive: false });

function applyTransform() {
  world.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
  updateMinimap();
}
function resetView() { scale = 0.82; tx = 30; ty = 60; applyTransform(); }

function updateMinimap() {
  const mm = document.getElementById('minimap');
  const vp = document.getElementById('minimap-viewport');
  const mmW = mm.offsetWidth, mmH = mm.offsetHeight;
  const worldW = 2400, worldH = 700;
  const s = Math.min(mmW / worldW, mmH / worldH);
  vp.style.width = (canvasEl.offsetWidth / scale) * s + 'px';
  vp.style.height = (canvasEl.offsetHeight / scale) * s + 'px';
  vp.style.left = (-tx / scale) * s + 'px';
  vp.style.top = (-ty / scale) * s + 'px';
}

// Init
renderChart('keyword');
window.addEventListener('resize', () => { drawArrows(); updateMinimap(); });
</script>
